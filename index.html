function roundedTop(x, y, w, h, r) {
  if (h <= 0) return '';
  r = Math.min(r, w / 2, h);
  var x2 = x + w, yr = y + r, yh = y + h;
  return 'M' + x.toFixed(1) + ',' + yh.toFixed(1) +
    ' L' + x.toFixed(1) + ',' + yr.toFixed(1) +
    ' Q' + x.toFixed(1) + ',' + y.toFixed(1) + ' ' + (x + r).toFixed(1) + ',' + y.toFixed(1) +
    ' L' + (x2 - r).toFixed(1) + ',' + y.toFixed(1) +
    ' Q' + x2.toFixed(1) + ',' + y.toFixed(1) + ' ' + x2.toFixed(1) + ',' + yr.toFixed(1) +
    ' L' + x2.toFixed(1) + ',' + yh.toFixed(1) + ' Z';
}

function renderAnnualChart(months) {
  var svg = document.getElementById('annual-svg');
  var W = 360, H = 140, PL = 10, PR = 10, PT = 18, PB = 22;
  var chartW = W - PL - PR, chartH = H - PT - PB;
  var maxVal = Math.max.apply(null, months.map(function(m){ return m.total; })) || 1;
  var gap = chartW / 12;
  var barW = Math.floor(gap * 0.46);
  var MIN_H = 3, SEP = 1, rx = 3;

  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  var legend =
    '<rect x="222" y="4" width="7" height="7" fill="#F5F5F7" rx="1"/>' +
    '<text x="231" y="12" font-size="9" fill="var(--text-muted)">생활비</text>' +
    '<rect x="278" y="4" width="7" height="7" fill="#8E8E93" rx="1"/>' +
    '<text x="287" y="12" font-size="9" fill="var(--text-muted)">고정비</text>';

  var bars = '';
  months.forEach(function(m, i) {
    var x = PL + i * gap + (gap - barW) / 2;
    var baseY = PT + chartH;
    var total = m.total || 0;
    var fixed = m.fixed || 0;
    var living = (m.living !== undefined) ? m.living : (total - fixed);
    if (living < 0) living = 0;

    if (total <= 0) {
      bars += '<rect x="' + x.toFixed(1) + '" y="' + (baseY - MIN_H).toFixed(1) + '" width="' + barW + '" height="' + MIN_H + '" fill="var(--border)" rx="' + rx + '"/>';
    } else {
      var fixedH = fixed > 0 ? Math.max(fixed / maxVal * chartH, MIN_H) : 0;
      var livingH = living > 0 ? Math.max(living / maxVal * chartH, MIN_H) : 0;
      var hasBoth = fixedH > 0 && livingH > 0;
      var fixedY = baseY - fixedH;
      var livingY = fixedY - (hasBoth ? SEP : 0) - livingH;

      if (fixedH > 0) {
        if (hasBoth) {
          bars += '<rect x="' + x.toFixed(1) + '" y="' + fixedY.toFixed(1) + '" width="' + barW + '" height="' + fixedH.toFixed(1) + '" fill="#8E8E93"/>';
        } else {
          bars += '<path d="' + roundedTop(x, fixedY, barW, fixedH, rx) + '" fill="#8E8E93"/>';
        }
      }
      if (livingH > 0) {
        bars += '<path d="' + roundedTop(x, livingY, barW, livingH, rx) + '" fill="#F5F5F7"/>';
      }

      var topY = livingH > 0 ? livingY : fixedY;
      bars += '<rect x="' + x.toFixed(1) + '" y="' + topY.toFixed(1) + '" width="' + barW + '" height="' + (baseY - topY).toFixed(1) + '" fill="transparent" data-month="' + m.month + '" data-total="' + total + '" data-living="' + living + '" data-fixed="' + fixed + '" class="annual-bar" style="cursor:pointer"/>';
    }

    bars += '<text x="' + (x + barW / 2).toFixed(1) + '" y="' + (PT + chartH + 14) + '" text-anchor="middle" font-size="9" fill="var(--text-muted)">' + m.month + '월</text>';
  });

  svg.innerHTML = legend + bars;

  svg.querySelectorAll('.annual-bar').forEach(function(bar) {
    bar.addEventListener('click', function(e) { e.stopPropagation(); showAnnualTooltip(e, this); });
  });
}

var _tooltipTimeout;
function showAnnualTooltip(e, bar) {
  var tooltip = document.getElementById('svg-tooltip');
  var month = bar.dataset.month;
  tooltip.innerHTML = '<strong>' + month + '월</strong><br>총 ' + formatMoney(bar.dataset.total) + '<br>생활비 ' + formatMoney(bar.dataset.living) + '<br>고정비 ' + formatMoney(bar.dataset.fixed);
  tooltip.style.display = 'block';
  var barRect = bar.getBoundingClientRect();
  var cx = barRect.left + barRect.width / 2;
  var above = barRect.top - tooltip.offsetHeight - 8;
  var top = above >= 8 ? above : barRect.bottom + 8;
  var halfW = tooltip.offsetWidth / 2;
  var left = Math.min(Math.max(cx, halfW + 8), window.innerWidth - halfW - 8);
  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  clearTimeout(_tooltipTimeout);
  _tooltipTimeout = setTimeout(function(){ tooltip.style.display='none'; }, 5000);
}

function positionTooltip(tooltip, rect) {
  var cx = rect.left + rect.width / 2;
  var above = rect.top - tooltip.offsetHeight - 8;
  var top = above >= 8 ? above : rect.bottom + 8;
  var halfW = tooltip.offsetWidth / 2;
  tooltip.style.left = Math.min(Math.max(cx, halfW + 8), window.innerWidth - halfW - 8) + 'px';
  tooltip.style.top = top + 'px';
}

function showTaxMemoTooltip(cell, year, month) {
  var tooltip = document.getElementById('svg-tooltip');
  tooltip.innerHTML = '<strong>' + month + '월 세금</strong><br>불러오는 중…';
  tooltip.style.display = 'block';
  positionTooltip(tooltip, cell.getBoundingClientRect());
  clearTimeout(_tooltipTimeout);
  _tooltipTimeout = setTimeout(function(){ tooltip.style.display = 'none'; }, 6000);

  var expKey = 'expenses_' + year + '_' + month;
  var cached = getCached(expKey);
  if (cached) { _applyTaxTooltip(tooltip, cell, month, cached); return; }

  callAPI('getExpenses', {year: year, month: month}).then(function(res) {
    if (res && res.success) {
      setCached(expKey, res.data);
      _applyTaxTooltip(tooltip, cell, month, res.data);
    }
  });
}

function _applyTaxTooltip(tooltip, cell, month, expenses) {
  var taxes = (expenses || []).filter(function(e) { return e.item && e.item.includes('세금'); });
  if (!taxes.length) { tooltip.style.display = 'none'; return; }
  var total = taxes.reduce(function(s, e) { return s + (e.amount || 0); }, 0);
  var lines = taxes.map(function(e) {
    return '↳ ' + escHtml(e.memo || '세금') + '&nbsp;&nbsp;' + formatMoney(e.amount);
  });
  tooltip.innerHTML = '<strong>' + month + '월 세금</strong>&nbsp;&nbsp;' + formatMoney(total) + '<br>' + lines.join('<br>');
  positionTooltip(tooltip, cell.getBoundingClientRect());
  clearTimeout(_tooltipTimeout);
  _tooltipTimeout = setTimeout(function(){ tooltip.style.display = 'none'; }, 5000);
}

function renderAnnualMatrix(months, fixedMonths) {
  var head = document.getElementById('annual-matrix-head');
  var tbody = document.getElementById('annual-matrix-body');
  if (!head || !tbody || !months) return;

  state._annualMonths = months;
  state._annualFixedMonths = fixedMonths;

  document.querySelectorAll('#annual-view-seg .seg-btn').forEach(function(b) {
    b.className = 'seg-btn' + (b.dataset.view === state.annualView ? ' active' : '');
  });

  var fixedMap = {};
  (fixedMonths || []).forEach(function(m) { fixedMap[m.month] = m; });

  var zeroTd = function(v, extraCls) {
    var cls = [extraCls, v > 0 ? '' : 'amount-zero'].filter(Boolean).join(' ');
    return '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + (v > 0 ? formatNum(v) : '–') + '</td>';
  };

  var html, footHtml;

  if (state.annualView === 'detail') {
    head.innerHTML = '<th>월</th>' + FIXED_BREAKDOWN_ITEMS.map(function(n) { return '<th>' + n + '</th>'; }).join('');

    var totFixed = {};
    FIXED_BREAKDOWN_ITEMS.forEach(function(n) { totFixed[n] = 0; });

    html = months.map(function(m) {
      var fd = fixedMap[m.month] || {};
      FIXED_BREAKDOWN_ITEMS.forEach(function(n) { totFixed[n] += (fd[n] || 0); });
      return '<tr><td>' + m.month + '월</td>' +
        FIXED_BREAKDOWN_ITEMS.map(function(n) {
          var v = fd[n] || 0;
          if (n === '세금' && v > 0) return '<td class="tax-cell" data-month="' + m.month + '">' + formatNum(v) + '</td>';
          return zeroTd(v);
        }).join('') +
      '</tr>';
    }).join('');

    footHtml = '<tr class="matrix-footer"><td>합계</td>' +
      FIXED_BREAKDOWN_ITEMS.map(function(n) {
        return '<td>' + (totFixed[n] > 0 ? formatNum(totFixed[n]) : '–') + '</td>';
      }).join('') +
    '</tr>';

  } else {
    head.innerHTML = '<th>월</th><th>생활비</th><th>고정비</th><th class="col-total">합계</th>';

    var totL = 0, totF = 0, totA = 0;

    html = months.map(function(m) {
      var living = m.total - m.fixed; // 기타 포함 변동비 전체
      totL += living; totF += m.fixed; totA += m.total;
      return '<tr><td>' + m.month + '월</td>' +
        zeroTd(living) +
        zeroTd(m.fixed) +
        zeroTd(m.total, 'col-total') +
      '</tr>';
    }).join('');

    footHtml = '<tr class="matrix-footer"><td>합계</td>' +
      '<td>' + (totL > 0 ? formatNum(totL) : '–') + '</td>' +
      '<td>' + (totF > 0 ? formatNum(totF) : '–') + '</td>' +
      '<td class="col-total">' + formatNum(totA) + '</td>' +
    '</tr>';
  }

  tbody.innerHTML = html + footHtml;
}

// ====================================================
// 이벤트 바인딩
// ====================================================
document.addEventListener('DOMContentLoaded', function() {
  // 날짜 기본값
  document.getElementById('expense-date').value = todayStr();

  // 탭 버튼
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { showTab(this.dataset.tab); });
  });

  // 오프라인 바
  document.getElementById('offline-bar').addEventListener('click', retrySendPending);

  // 사용자 Segmented Control
  document.querySelectorAll('#seg-user .seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.selectedUser = this.dataset.user;
      localStorage.setItem('lastUser', state.selectedUser);
      updateUserSeg();
      if (!state.categoryManuallySet) {
        var lastCat = localStorage.getItem('lastCategory_' + state.selectedUser);
        if (lastCat) {
          state.selectedMajorCat = catToMajor(lastCat);
          var sub = document.getElementById('expense-subcat');
          if (state.selectedMajorCat === '생활비' && sub) sub.value = lastCat;
        } else {
          state.selectedMajorCat = null;
        }
        updateCategoryForm();
      }
      updateItemSuggestions();
      clearError('user-error', Array.from(document.querySelectorAll('#seg-user .seg-btn')));
    });
  });

  // 분류 Segmented Control
  document.querySelectorAll('#seg-major .seg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.selectedMajorCat = this.dataset.major;
      state.categoryManuallySet = true;
      clearError('category-error', Array.from(document.querySelectorAll('#seg-major .seg-btn')));
      updateCategoryForm();
    });
  });

  // 날짜 빠른 pill
  document.getElementById('pill-yesterday').addEventListener('click', function() {
    document.getElementById('expense-date').value = yesterdayStr();
    updateDatePills();
  });
  document.getElementById('pill-today').addEventListener('click', function() {
    document.getElementById('expense-date').value = todayStr();
    updateDatePills();
  });
  document.getElementById('expense-date').addEventListener('change', updateDatePills);

  // 금액 입력
  document.getElementById('expense-amount').addEventListener('input', function() {
    var raw = parseMoney(this.value);
    var clamped = clampAmount(raw);
    this.value = clamped > 0 ? clamped.toLocaleString('ko-KR') : '';
    if (raw > 9999999) {
      showError(this, 'amount-error', '최대 금액을 초과했습니다.');
    } else {
      clearError('amount-error', [this]);
    }
  });
  document.getElementById('expense-amount').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('expense-memo').focus(); }
  });

  // 빠른 추가 pill
  document.querySelectorAll('.amount-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      var current = parseMoney(document.getElementById('expense-amount').value);
      var added = clampAmount(current + parseInt(this.dataset.add, 10));
      document.getElementById('expense-amount').value = added > 0 ? added.toLocaleString('ko-KR') : '';
      clearError('amount-error', [document.getElementById('expense-amount')]);
    });
  });

  // 메모 Enter → 저장
  document.getElementById('expense-memo').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSaveExpense(); }
  });
  document.getElementById('expense-memo').addEventListener('input', function() {
    document.getElementById('memo-count').textContent = this.value.length;
  });

  // 고정비 항목 드롭다운
  document.getElementById('expense-item-select').addEventListener('change', function() {
    clearError('item-error', [this, document.getElementById('expense-item')]);
    updateTaxChips();
  });
  document.getElementById('tax-chips-row').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-tax]');
    if (!btn) return;
    var memo = document.getElementById('expense-memo');
    memo.value = btn.dataset.tax;
    document.getElementById('memo-count').textContent = btn.dataset.tax.length;
    memo.focus();
  });

  // 항목명 입력
  document.getElementById('expense-item').addEventListener('input', function() {
    clearError('item-error', [this]);
  });
  document.getElementById('expense-item').addEventListener('change', function() {
    clearError('item-error', [this]);
  });

  // 저장 버튼
  document.getElementById('save-btn').addEventListener('click', onSaveExpense);

  // 수정 취소
  document.getElementById('edit-cancel').addEventListener('click', cancelEditMode);

  // 월간 네비
  document.getElementById('monthly-prev').addEventListener('click', function() {
    if (state.monthlyMonth === 1) { state.monthlyYear--; state.monthlyMonth = 12; }
    else state.monthlyMonth--;
    loadMonthlyData();
  });
  document.getElementById('monthly-next').addEventListener('click', function() {
    var now = new Date();
    if (state.monthlyYear > now.getFullYear() || (state.monthlyYear === now.getFullYear() && state.monthlyMonth >= now.getMonth()+1)) return;
    if (state.monthlyMonth === 12) { state.monthlyYear++; state.monthlyMonth = 1; }
    else state.monthlyMonth++;
    loadMonthlyData();
  });

  // 연간 뷰 토글
  // 연간 세금 셀 툴팁
  document.getElementById('annual-matrix-body').addEventListener('click', function(e) {
    var cell = e.target.closest('.tax-cell');
    if (!cell) return;
    e.stopPropagation();
    showTaxMemoTooltip(cell, state.annualYear, parseInt(cell.dataset.month));
  });

  document.getElementById('annual-view-seg').addEventListener('click', function(e) {
    var btn = e.target.closest('.seg-btn');
    if (!btn || btn.dataset.view === state.annualView) return;
    state.annualView = btn.dataset.view;
    renderAnnualMatrix(state._annualMonths, state._annualFixedMonths);
  });

  // 연간 네비
  document.getElementById('annual-prev').addEventListener('click', function() {
    var years = state.availableYears;
    var idx = years.indexOf(state.annualYear);
    if (idx < years.length - 1) { state.annualYear = years[idx+1]; loadAnnualData(); }
  });
  document.getElementById('annual-next').addEventListener('click', function() {
    var years = state.availableYears;
    var idx = years.indexOf(state.annualYear);
    if (idx > 0) { state.annualYear = years[idx-1]; loadAnnualData(); }
  });

  // 액션 시트
  document.getElementById('action-cancel-btn').addEventListener('click', closeActionSheet);
  document.getElementById('action-sheet-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeActionSheet();
  });
  document.getElementById('action-edit-btn').addEventListener('click', function() {
    if (!_actionData) return;
    var data = _actionData;
    closeActionSheet();
    // 해당 데이터 찾기
    var key = 'expenses_' + state.monthlyYear + '_' + state.monthlyMonth;
    var cached = getCached(key);
    if (cached) {
      var found = cached.find(function(e){ return e.rowIndex === data.rowIndex; });
      if (found) { openEditMode(found, 'monthly'); return; }
    }
    // 캐시 없으면 GAS 호출
    callAPI('getExpenses', {year: state.monthlyYear, month: state.monthlyMonth}).then(function(res) {
      if (res.success) {
        var found = res.data.find(function(e){ return e.rowIndex === data.rowIndex; });
        if (found) openEditMode(found, 'monthly');
      }
    });
  });
  document.getElementById('action-delete-btn').addEventListener('click', function() {
    if (!_actionData) return;
    var data = _actionData;
    closeActionSheet();
    document.getElementById('confirm-msg').textContent = "'" + data.name + "'을 삭제할까요? 되돌릴 수 없습니다.";
    document.getElementById('confirm-overlay').classList.add('show');
    document.getElementById('confirm-ok-btn').onclick = function() {
      document.getElementById('confirm-overlay').classList.remove('show');
      doDeleteExpense(data.rowIndex, data.name);
    };
  });
  document.getElementById('confirm-cancel-btn').addEventListener('click', function() {
    document.getElementById('confirm-overlay').classList.remove('show');
  });
  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });

  // 카테고리 저장 시 localStorage 업데이트 (저장 성공 후 처리됨)

  // PIN 인증 후 앱 시작
  function startApp() {
    document.getElementById('pin-overlay').classList.remove('show');
    checkOfflineBar();
    showTab('home');
    updateUserSeg();
    document.getElementById('expense-date').value = todayStr();
    updateDatePills();
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        if (state.currentTab === 'home') loadHomeData();
        else if (state.currentTab === 'monthly') loadMonthlyData();
        else if (state.currentTab === 'annual') loadAnnualData();
      }
    });
  }

  async function submitPin() {
    var pin = document.getElementById('pin-input').value.trim();
    if (!pin) return;
    var btn = document.getElementById('pin-submit');
    var errEl = document.getElementById('pin-error');
    btn.disabled = true; btn.textContent = '확인 중...';
    errEl.style.display = 'none';

    localStorage.setItem('app_pin', pin);
    try {
      var res = await callAPI('getAvailableYears', {});
      if (res && res.error === '인증 실패') {
        localStorage.removeItem('app_pin');
        document.getElementById('pin-input').value = '';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = '확인';
        return;
      }
    } catch(e) { /* 네트워크 오류 시 PIN 저장 유지하고 진행 */ }

    startApp();
  }

  document.getElementById('pin-submit').addEventListener('click', submitPin);
  document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitPin();
  });

  if (getStoredPin()) {
    startApp();
  } else {
    document.getElementById('pin-overlay').classList.add('show');
    setTimeout(function() { document.getElementById('pin-input').focus(); }, 100);
  }

  document.addEventListener('click', function() {
    var tooltip = document.getElementById('svg-tooltip');
    if (tooltip && tooltip.style.display !== 'none') {
      tooltip.style.display = 'none';
      clearTimeout(_tooltipTimeout);
    }
  });
});
</script>
